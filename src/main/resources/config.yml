# ─────────────────────────────────────────
#  RareItemsHunter  –  config.yml
#  Authors: Zyvera-Systems & Thomas U.
# ─────────────────────────────────────────

# Language: de | en
language: de

# Firework power (0 = instant, 1 = normal, 2 = high)
firework-power: 1

# GUI title (supports & color codes)
gui-title: "&8» &6&lSeltene Items &8«"

# Global chat announcement when a player finds an item
# Placeholders: {player}, {item}, {rank}, {total}
announce-find: true

# ─────────────────────────────────────────
#  Optional reward commands
#  Disabled by default.
#  mode: PER_ITEM = rewards from the matching item entry
#        GLOBAL   = rewards.commands for every found item
#  Placeholders: {player}, {item}, {id}, {rank}, {total}, {time}
# ─────────────────────────────────────────
rewards:
  enabled: false
  mode: "PER_ITEM"
  commands:
    on-found: []
    on-complete: []

# ─────────────────────────────────────────
#  Hidden / spoiler mode
#  If enabled, unfound entries only show ??? until they were found.
# ─────────────────────────────────────────
spoiler-mode:
  enabled: false

