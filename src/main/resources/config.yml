# Language: de | en
language: de

# Firework power (0 = instant, 1 = normal, 2 = high)
firework-power: 1

# GUI title (supports & color codes)
gui-title: "&8» &6&lSeltene Items &8«"

# Global chat announcement when a player finds an item
# Placeholders: {player}, {item}, {rank}, {total}
announce-find: true

# ─────────────────────────────────────────
#  Custom items (extends the built-in list)
#  id:             unique key (no spaces)
#  material:       Bukkit Material name
#  name:           display name (&-color codes)
#  chance:         short chance text  e.g. "0.5 %"
#  description:    one-line description (italic lore)
#  rarity:         integer rank (lower = rarer)
#  occurrence-only: true = click to confirm event (no item needed)
# ─────────────────────────────────────────
custom-items: []
# Example:
# custom-items:
#   - id: "my_item"
#     material: "DIAMOND_BLOCK"
#     name: "&b&lDiamond Block"
#     chance: "0.01 %"
#     description: "Somehow found a full diamond block"
#     rarity: 50
#     occurrence-only: false
