name: RareItemsHunter
version: '1.3.2'
main: dev.zyvera.rareitemshunter.RareItemsHunter
api-version: '1.21'
description: Track and collect rare Minecraft items.
authors: [ Zyvera-Systems, Thomas U. ]
website: https://github.com/ThomasUgh/RareItemsHunter
folia-supported: true

commands:
  ri:
    description: RareItemsHunter main command.
    usage: /ri [help|reset <player>|reload|give <player> <id>|rewardmode <peritem|global>]
    aliases: [ rih, rareitems ]
    permission: rih.use

permissions:
  rih.use:
    description: Open the rare items GUI.
    default: true
  rih.admin:
    description: Admin commands (reset, reload, give).
    default: op
